<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tan — Tarayıcıda</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 16px; background:#1a1a1a; color:#e0e0e0; }
  h1 { color:#ff9a3c; }
  textarea { width:100%; height:240px; font-family:monospace; font-size:14px; background:#0d0d0d; color:#e0e0e0; border:1px solid #444; border-radius:8px; padding:12px; box-sizing:border-box; }
  button { background:#ff9a3c; color:#1a1a1a; border:none; padding:10px 24px; font-size:15px; font-weight:bold; border-radius:8px; cursor:pointer; margin:12px 0; }
  button:disabled { background:#555; cursor:wait; }
  pre { background:#0d0d0d; border:1px solid #444; border-radius:8px; padding:12px; white-space:pre-wrap; min-height:60px; }
  .durum { color:#888; font-size:13px; }
</style>
</head>
<body>
  <h1>Tan — Tarayıcıda çalışıyor</h1>
  <p class="durum" id="durum">WASM yükleniyor…</p>

  <textarea id="kod">yaz "Merhaba, ben tarayıcıda çalışan Tan!"

toplam = 0
i = 1
iken i <= 10
    toplam = toplam + i
    i = i + 1
son
yaz "1'den 10'a toplam: " + toplam

her meyve ["elma", "armut", "kiraz"] içinde
    yaz "meyve: " + meyve
son</textarea>

  <button id="calistir" disabled>Çalıştır</button>

  <h3>Çıktı</h3>
  <pre id="cikti">—</pre>

<script src="WasmExec.js"></script>
<script>
  const go = new Go();
  const durum = document.getElementById("durum");
  const btn = document.getElementById("calistir");

  WebAssembly.instantiateStreaming(fetch("tan.wasm"), go.importObject)
    .then((sonuc) => {
      go.run(sonuc.instance);
      durum.textContent = "Tan hazır. Kod yazıp Çalıştır'a bas.";
      btn.disabled = false;
    })
    .catch((e) => { durum.textContent = "WASM yüklenemedi: " + e; });

  btn.addEventListener("click", () => {
    const kod = document.getElementById("kod").value;
    // tanCalistir, WASM tarafından global'e tanıtıldı
    const cikti = tanCalistir(kod);
    document.getElementById("cikti").textContent = cikti || "(çıktı yok)";
  });
</script>
</body>
</html>
